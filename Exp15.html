<!DOCTYPE html>
<html>
<head>
	<title></title>
</head>
<body>
	<h1>Course Registration Form</h1>
	<form action=" ">
		<fieldset>
		<legend>Personal Details :</legend>
			<table>
				<tr><td><label>First Name</label></td><td><input type="text" name="FN" required minlength="3" placeholder="Ex:Prathap" size="15" pattern="[a-zA-z]{3,8}"></td></tr>
				<tr><td><label>Surname</label></td> <td><input type="text" name="SN" required minlength="3" placeholder="Ex:BD" size="15" maxlength="15"></td></tr>
				<tr><td><label>Mobile Number</label></td> <td><input type="tel" name="Number" required placeholder="872-293-9366" size="15" maxlength="10"></td></tr>
				<tr><td><label>Email</label></td> <td><input type="Email" name="Mail" required placeholder="Ex:abc@gmail.com" size="15" pattern="[a-z0-9._]+@[a-z]+.[a-z]{2,}"></td></tr>
				<tr><td><label>Password</label></td> <td><input type="Password" name="pwd" required placeholder="Min 5 character" size="15"></td></tr>
				<tr><td><label>Conirm Password</label></td> <td><input type="Password" name="cwpwd" required placeholder="min 5 character" size="15"></td></tr>
				<tr><td><label>DOB</label></td> <td><input type="Date" name="dob" required placeholder="dd-mm-yyyy" size="15"></td></tr>
				<tr><td><label>Gender</label></td> <td><input type="radio" name="gender" value="M">Male<input type="radio" name="gender" value="F">Female<input type="radio" name="gender" value="C">Custom</td></tr>
				<tr><td><label>Select Country</label></td> <td><select name="country">
				<option value="INDIA">India</option>
				<option value="USA">USA</option>
				<option value="CHINA">CHINA</option>
			    </select></td></tr>
				<tr><td><label>Upload Picture</label></td> <td><input type="file" name="pic"></td></tr>
			</table>
			<input type="reset">
		</fieldset>
		<fieldset>
			<legend>Course Details :</legend>
			<table>
				<tr><td><label>Select Course</label></td><td><select name="Course">
				<option value="PFS">Python Fullstack</option>
				<option value="JFS">Java Fullstack</option>
				<option value="CP">Core Python</option>
				<option value="CJ">Core Java</option>
				<option value="DSP">Data science using Python</option>
				</select></td></tr>
				<tr><td><label>Delivery Mode</label></td> <td><input type="checkbox" name="mode1" value="ON">Online<input type="checkbox" name="mode2" value="OFF">Offline</td></tr>
				<tr><td><label>Comments</label></td></tr><br>
			</table>
			<textarea rows="4" cols="40"></textarea>
		</fieldset>
		<img src="https://tse3.mm.bing.net/th/id/OIP.kIqzujNpXIEC12mtjezAnQAAAA?r=0&rs=1&pid=ImgDetMain&o=7&rm=3" height="75" width="75" type="input">
	</form>
</body>
</html>
