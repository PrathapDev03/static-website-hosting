<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Google page</title>
	<style type="text/css">
		.text{
      		width: 300px;
      		padding: 8px 8px;   /* top/bottom, left/right */
      		border: 2px solid gray;  /* border of the box */
      		border-radius: 50px;   /* makes it oval */
      		outline: none;   /* removes blue border on focus */
      		font-size: 20px;
    }
	</style>
</head>
<body>
	<p align="center">
		<br><br><br><br><br><br><br><br>
		<img src="https://vectorseek.com/wp-content/uploads/2023/12/Google-Images-Logo-Vector.svg--300x103.png" width="300">
	</p>
	<p align="center">
		<input type="text" class="text" size="60" placeholder=" " list="suggestions" >
		<input type="submit" value="search">
		<datalist id="suggestions">
			<option value="amazon"> </option>
			<option value="banana"> </option>
			<option value="cowazo"> </option>
			<option value="dmazon"> </option>
			<option value="emazon"> </option>
			<option value="fmazon"> </option>
			<option value="gmazon"> </option>
			<option value="hmazon"> </option>
			<option value="imazon"> </option>
		</datalist>
	</p>
</body>
</html>







<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title></title>
</head>
<body>
	<form oninput="x.value=parseInt(pr.value)">
		<label>Price Range :</label>
		<input type="range" id="pr" min="500" max="10000">
		<label>Rs.</label>
		<output name="x" for="pr"></output>
	</form>
</body>
</html>
